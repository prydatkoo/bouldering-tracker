<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@400;600&family=VT323&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="topnav">
        <a href="./index.html">Home</a>
        <a href="./about.html"> About Dyno! </a>
        <a href="./WIP.html">Sign in</a>
        <a href="./home.html" class="active">Track!</a>
    </div>

    <main>
        <h1 class="home-title">Welcome Back!</h1>
        <div class="climbs-home">
            <h2>Track Your Climb!</h2>
            <form id="climb-form" class="climb-form">
                <input name="name" placeholder="Climb Name" required />
                <select name="grade" required>
                    <option value="">Select grade</option>
                    <option value="V1 / Green">V1 / Green</option>
                    <option value="V2 / Yellow">V2 / Yellow</option>
                    <option value="V3 / Blue">V3 / Blue</option>
                    <option value="V4 / Red">V4 / Red</option>
                    <option value="V5 / Grey">V5 / Grey</option>
                    <option value="V6 / Black">V6 / Black</option>
                </select>
                <button type="submit" class="button-hero">Add climb</button>
            </form>

            <ul id="climb-list" class="climb-list"></ul>
        </div>
    </main>
</body>

<script src="/js/home.js"></script>

</html>
